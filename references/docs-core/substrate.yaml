# substrate.yaml — declared verification gates for this repo.
#
# The substrate engine (/substrate:execute, /substrate:quick-spec, /substrate:diagnose)
# reads these and runs them; it NEVER guesses your toolchain. Fill each gate with YOUR
# command. Order run: gate.compile → gate.test → gate.lint. A missing file or a missing
# required key aborts execution with an explanation (no probing, no fallback).
version: 1
gate:
  compile: "{{GATE_COMPILE}}"   # e.g. tsc --noEmit  ·  cargo build  ·  uv run mypy .
  test:    "{{GATE_TEST}}"      # e.g. vitest run    ·  cargo test   ·  uv run pytest -q
  lint:    "{{GATE_LINT}}"      # e.g. eslint .      ·  cargo clippy ·  uv run ruff check .

# --- Execution partition policy (deviatable prior; see agents-parallel-execution-doctrine.md) ---
# /substrate:graph-spec reads these to cut the bead DAG into agent-sized `group:<window-N>`
# windows so no runner's context rots. The orchestrator MAY re-batch (a logged deviation).
execution:
  context-budget: 0.4      # max fraction of a window a group may fill before graph-spec splits it
  default-rung: auto       # auto | monolith | phase | group | per-bead

# --- Cloud dispatch environment (consumed by .github/workflows/substrate-orchestrate.yml) ---
# OPTIONAL. Present → the repo is cloud-dispatch-enabled: /substrate:dispatch <epic> can fire a
# GitHub runner that runs `/substrate:orchestrate epic:<slug> --auto --pr` headless and opens a PR
# whose per-bead commits accumulate live, wave by wave. Absent → dispatch refuses (not an error).
# /substrate:adopt fills this — auto-detecting `services`/`bootstrap` from an existing CI workflow
# when one exists, else asking. It prints `secrets-needed` as a manual "add these" instruction and
# never writes secret VALUES here.
#
# NOTE (GitHub constraint): `services:` and `runs-on:` are STATIC job keys — a generic workflow
# cannot compute them from this block at runtime. adopt therefore token-substitutes them into the
# copied workflow at install time (this block is the single source of truth for that substitution,
# not read live).
#
# ci:
#   runner: "ubuntu-latest"          # → runs-on; the single swap point for self-hosted runners later
#   services:                        # verbatim GitHub Actions `services:` map (omit if none needed)
#     postgres:
#       image: "postgres:16-alpine"
#       env: { POSTGRES_USER: "app", POSTGRES_PASSWORD: "password", POSTGRES_DB: "app" }
#       ports: ["5433:5432"]
#       options: "--health-cmd \"pg_isready\" --health-interval 2s --health-timeout 3s --health-retries 15"
#   bootstrap:                       # ordered shell steps run AFTER toolchain-pin.install, BEFORE orchestrate
#     - "<db:init / db:migrate / db:seed / codegen — whatever the gate needs in a fresh container>"
#   secrets-needed:                  # NAMES only (never values) — adopt prints these to add manually
#     - "ANTHROPIC_API_KEY"          # the headless agent's key; add via `gh secret set`

# --- Optional: parallel-bead execution (see agents-parallel-execution-doctrine.md) ---
# out-of-band gates (e2e, device, paid service) — not run on every step:
#  out-of-band:
#    - name: e2e
#      command: "<command>"
#      when: phase-tagged      # phase-tagged | manual
#
# worktree-seed[] + toolchain-pin: what /substrate:orchestrate copies into each fresh git
# worktree before dispatching a bead (a worktree contains only TRACKED files). Declare these
# whenever a fresh worktree would LACK a gitignored input your gate needs — otherwise the gate
# fails spuriously and the orchestrator falls back to hand-seeding every run. Common inputs:
# a virtualenv (.venv), dependency dirs (node_modules), generated clients / codegen output,
# env files (.env*). Leave empty ONLY if a fresh worktree passes the gate with no extra setup.
# /substrate:orchestrate warns before dispatch if this is empty but your .gitignore names
# build/dep paths the gate plausibly needs. See agents-parallel-execution-doctrine.md §Supporting.
#
# worktree-seed:               # gitignored paths (globs) copied into each fresh worktree
#   - ".venv"
#   - "node_modules"
#   - "<generated-client-or-codegen-output>"
# toolchain-pin:
#   install: "<per-worktree dependency install, e.g. uv sync · pnpm install --frozen-lockfile>"
#   env:                       # resolved env prefixed onto every gate command in a worktree
#     KEY: "value"             # e.g. MIGRATIONS_DATABASE_URL: "postgresql://…"
