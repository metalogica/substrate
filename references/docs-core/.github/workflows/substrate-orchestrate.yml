# substrate-orchestrate.yml — cloud dispatch seam (the PORT).
#
# Runs `/substrate:orchestrate <epic> --auto --pr` on a GitHub runner: fetches the graphed epic's
# beads, reproduces the repo's declared gate environment, executes the bead DAG headless, and pushes
# feat/<epic-slug> wave-by-wave so an open PR accumulates the per-bead commits live. GitHub's
# "Squash and merge" is the single squasher (orchestrate --pr suppresses its own trunk-squash).
#
# This file is INSTALLED BY /substrate:adopt, which token-substitutes the {{...}} slots from
# substrate.yaml's `ci:` block + `toolchain-pin` (GitHub `services:`/`runs-on:` are static job keys
# and cannot be computed at runtime — see substrate.yaml `ci:` NOTE). Do not hand-edit the tokens;
# re-run adopt or edit substrate.yaml and re-substitute. v1 trigger is manual (workflow_dispatch);
# the event-driven trigger (on: push: [tbd-sync] + new-epic guard + run:<id> claim-lock) is the
# documented v2 upgrade and changes ONLY the `on:` block below.
#
# AGENT PATH — {{AGENT_STEP}} is a DUAL seam (adopt substitutes the chosen variant, see below):
#   • Claude official-action (RECOMMENDED, proven 2026-07-16 — dispatch-spec Phase-1 findings):
#     anthropics/claude-code-action@v1 auto-installs the CLI AND the substrate plugin via its
#     plugin_marketplaces/plugins inputs; auth via subscription OAuth (CLAUDE_CODE_OAUTH_TOKEN).
#     REQUIRES `id-token: write` (below) — the action mints its GitHub token via OIDC.
#   • raw-CLI (framework-agnostic default; plugin-install still UNPROVEN — see findings): a bare
#     `claude -p` (or any non-Claude runner) via {{AGENT_COMMAND}} + ANTHROPIC_API_KEY.
name: substrate-orchestrate

on:
  workflow_dispatch:
    inputs:
      epic:
        description: "epic slug (e.g. rnk-xyz1) or epic:<slug> label"
        required: true

# Double-fire guard: two dispatches of the SAME epic cannot run concurrently. (v1 relies on this +
# manual triggering; v2's event-driven path adds a persisted run:<id> claim-lock on top.)
concurrency:
  group: substrate-orchestrate-${{ github.event.inputs.epic }}
  cancel-in-progress: false

# The runner pushes feat/<epic-slug> and opens the PR on the default GITHUB_TOKEN.
permissions:
  contents: write
  pull-requests: write
  id-token: write        # REQUIRED by the Claude official-action agent variant (OIDC token mint);
                         # harmless/unused for the raw-CLI variant. Removing it breaks the action with
                         # "Could not fetch an OIDC token" (Phase-1 finding).

jobs:
  orchestrate:
    runs-on: {{CI_RUNNER}}                # ← ci.runner (default ubuntu-latest)

    # {{CI_SERVICES}} — ci.services, substituted verbatim by adopt (omit the whole key if none).
    services: {{CI_SERVICES}}

    # {{CI_ENV}} — any env the gate needs (e.g. DATABASE_URL pointing at the service above).
    env: {{CI_ENV}}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # full history: orchestrate cuts/merges the integration branch

      # D1 — bead visibility (Phase-1 finding). The epic's graphed beads live in the local .tbd store
      # (gitignored: only .tbd/config.yml is tracked) synced to the `tbd-sync` branch. A bare
      # `git fetch tbd-sync` makes a branch REF only — it does NOT hydrate the store, and
      # bead-graph.sh (which orchestrate reads the DAG from) needs BOTH the `tbd` CLI AND a hydrated
      # store, else it aborts "no DAG". So: install tbd, then `tbd sync --pull` (pull-only — an empty
      # runner store must never PUSH-wipe tbd-sync).
      - name: Install tbd + hydrate bead state
        run: |
          npm i -g get-tbd
          tbd sync --pull --issues || echo "no tbd-sync beads to pull yet"

      # --- Toolchain + gate environment (mirrors the repo's own CI recipe) ---
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install toolchain
        run: {{TOOLCHAIN_INSTALL}}       # ← substrate.yaml toolchain-pin.install
                                         # NOTE: use the package-manager prefix for workspace-bin tools
                                         # (`pnpm turbo`, not bare `turbo`) — the bin isn't on PATH
                                         # (exit-127 Phase-1 finding).

      - name: Bootstrap gate environment
        run: |
          {{CI_BOOTSTRAP}}               # ← ci.bootstrap steps (db:init/migrate/seed, codegen, …)

      # --- The agent — {{AGENT_STEP}}, substituted by adopt with ONE of the two variants below. ---
      # VARIANT A — Claude official-action (RECOMMENDED, proven). adopt writes:
      #   - name: Orchestrate epic (headless, PR-output)
      #     uses: anthropics/claude-code-action@v1
      #     with:
      #       claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}   # subscription OAuth
      #       plugin_marketplaces: |
      #         {{PLUGIN_MARKETPLACE_URL}}          # MUST be https://…/substrate.git (regex-validated)
      #       plugins: |
      #         substrate@{{MARKETPLACE_NAME}}      # e.g. substrate@metalogica
      #       prompt: "/substrate:orchestrate ${{ github.event.inputs.epic }} --auto --pr"
      #       claude_args: "--permission-mode bypassPermissions"
      #
      # VARIANT B — raw-CLI (framework-agnostic; plugin-install UNPROVEN). adopt writes:
      #   - name: Install headless agent
      #     run: npm i -g @anthropic-ai/claude-code   # + your resolved substrate plugin-install method
      #   - name: Orchestrate epic (headless, PR-output)
      #     run: {{AGENT_COMMAND}}                    # default: claude -p "/substrate:orchestrate
      #                                               #   ${{ github.event.inputs.epic }} --auto --pr"
      #                                               #   --permission-mode bypassPermissions
      #     env:
      #       ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #       GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      {{AGENT_STEP}}

      # Fallback: if orchestrate --pr didn't open the PR (e.g. it aborted mid-wave), ensure one
      # exists over whatever landed so the run is never a silent no-op.
      - name: Ensure PR exists
        if: always()
        run: |
          slug="${{ github.event.inputs.epic }}"; slug="${slug#epic:}"
          git ls-remote --exit-code --heads origin "feat/${slug}" >/dev/null 2>&1 || exit 0
          gh pr view "feat/${slug}" >/dev/null 2>&1 || \
            gh pr create -f -H "feat/${slug}" -t "epic: ${slug}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
