# substrate-tmux.conf — config for substrate's OWN tmux server (`tmux -L substrate`).
# Never touches the user's personal tmux config or bindings (tmux binds are
# server-global, which is exactly why the composer runs on its own socket).
# Read once at server birth — `tmux -L substrate kill-server` to reload after edits.

set -g mouse on
set -g base-index 0
set -g allow-rename off
set -g automatic-rename off
set -g history-limit 50000
set -g status-left "#[bold] substrate:#S "
set -g status-left-length 40
set -g status-right " M-1 board · M-2 specs · M-3 agent · M-n new agent "
set -g status-right-length 60

# Direct window jumps — no prefix.
bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2

# New agent window in the current pane's directory; `exec ${SHELL}` keeps the
# window alive after claude exits instead of closing it.
bind -n M-n new-window -c "#{pane_current_path}" "claude; exec ${SHELL:-zsh}"
